<!DOCTYPE html>
<html lang="uk">
<head> <!-- Налаштування вкладки та підключення стилів -->
	<meta charset="UTF-8">
	<title>BlogHub Редагування</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<nav></nav> <!-- Шапка сайту, заповнюється автоматично через app.js -->

	<main class="container main-wrapper">
		<!-- Кнопка повернення на головну сторінку -->
		<div class="back-nav fadeInUp"><a href="index.html" class="btn-back">← На головну</a></div>

		<!-- Картка з формою для редагування публікації -->
		<div class="content-card fadeInUp" style="max-width: 800px; margin: 0 auto;">
			<h2 class="text-accent">Редагувати пост</h2>
			<form id="editForm" style="margin-top:20px;">
				<!-- Поля для зміни заголовка та категорії -->
				<div class="form-group"><label>Заголовок</label><input type="text" id="title" required></div>
				<div class="form-group"><label>Категорія</label><select id="category" required></select></div>
				<!-- Основний текст публікації -->
				<div class="form-group"><label>Зміст</label><textarea id="content" rows="12" required></textarea></div>
				<!-- Поле для вставки коду карти iFrame-->
				<div class="form-group"><label>Google Maps (код iFrame)</label><textarea id="maps" rows="3"></textarea></div>
				<!-- Кнопки для підтвердження змін або скасування дій -->
				<div style="display:flex; gap:10px;">
					<button type="submit" class="btn-accent" style="flex:2">Зберегти зміни</button>
					<button type="button" onclick="history.back()" class="btn-accent" style="flex:1; background:#333; color:#fff;">Скасувати</button>
				</div>
			</form>
		</div>
	</main>

	<footer></footer> <!-- Футер(ofc at the bottom) -->

	<script src="js/app.js"></script> <!-- Підключення загальної логіки -->
	<script src="js/edit.js"></script> <!-- Підключення логіки редагування -->
</body>
</html>
