<!DOCTYPE html>
<html lang="uk">
<head> <!-- Налаштування вкладки, підключення стилів -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>BlogHub Головна</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<nav></nav> <!-- Шапка сайту, заповнюється автоматично через app.js -->

	<main class="container main-wrapper">
		<!-- Заголовок сторінки та привітання -->
		<header class="page-header fadeInUp">
			<h1 class="text-accent">Стрічка публікацій</h1>
			<p class="text-muted">Дізнавайся та ділись частинками життя</p>
			<!-- Панель із пошуком, фільтрацією за категоріями та сортування -->
			<div class="filter-bar content-card">
				<input type="text" id="searchInput" placeholder="Пошук за назвою...">
				<input type="text" id="authorSearchInput" placeholder="Пошук за автором...">
				<select id="categoryFilter"><option value="">Всі категорії</option></select>
				<!-- Вибір порядку відображення та кількості постів на сторінці -->
				<select id="sortFilter">
					<option value="DESC">Спочатку нові</option>
					<option value="ASC">Спочатку старі</option>
				</select>
				<select id="limitFilter" style="max-width: 150px;">
					<option value="5">По 5 на сторінці</option>
					<option value="10">По 10 на сторінці</option>
					<option value="20">По 20 на сторінці</option>
				</select>
			</div>
		</header>
		<!-- Місце для відображення постів -->
		<div id="news-container" class="news-grid"></div>
		<!-- Кнопочки перемикання сторінок -->
		<div id="pagination" class="pagination-container fadeInUp"></div>
	</main>

	<footer></footer> <!-- Футер(ofc at the bottom) -->
	
	<script src="js/app.js"></script> <!-- Підключення спочатку загальної логіки -->
	<script src="js/main.js"></script> <!-- А потім мейн сторінки -->
</body>
</html>
